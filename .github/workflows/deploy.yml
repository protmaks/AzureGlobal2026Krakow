name: CI/CD Pipeline 

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
  
jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build Docker Image
        run: |
          cd src
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/razorpages-movie:latest .

      - name: Push Docker Image to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/razorpages-movie:latest

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Variables
        shell: pwsh
        run: |
          @("ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}",
            "ARM_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}",
            "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}",
            "ARM_USE_OIDC=true",
            "ARM_USE_AZUREAD=true",
            "TF_VAR_client_id=${{ secrets.AZURE_CLIENT_ID }}",
            "TF_VAR_client_secret=${{ secrets.AZURE_CLIENT_SECRET }}",
            "TF_VAR_tenant_id=${{ secrets.AZURE_TENANT_ID }}",
            "TF_VAR_subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}") | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Initialize Terraform
        shell: pwsh
        run: terraform init

      - name: Plan Terraform Changes
        shell: pwsh
        run: terraform plan

      - name: Apply Terraform Changes
        shell: pwsh
        run: terraform apply -auto-approve

      - name: Azure Login for Cleanup
        if: failure()
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Unlock Terraform State on Failure
        if: failure()
        shell: pwsh
        run: |
          az storage blob lease break `
            --account-name stprotmaks `
            --container-name tfstate `
            --blob-name terraform.tfstate

  update-app-service:
    name: Deploy to App Service
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: app-razorpages-user11
          images: ${{ secrets.ACR_LOGIN_SERVER }}/razorpages-movie:latest